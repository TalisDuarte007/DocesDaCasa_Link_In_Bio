<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talis Duarte - Links</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://github.com/TalisDuarte007/DocesDaCasa_Link_In_Bio/blob/main/css/reset.css" />
    <link rel="stylesheet" href="https://github.com/TalisDuarte007/DocesDaCasa_Link_In_Bio/blob/main/css/style.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  </head>

  <body>
    <div id="vanta"></div>
    <main>
      <header>
        <img
          class="foto-perfil"
          src="img/profile.jpg"
          alt="Doces Da Casa"
        />
        <h1 class="titulo">@DocesDaCasa.Oficial</h1>
      </header>

      <ul class="lista">
        <li class="lista-item">
          <a class="link" href="https://www.instagram.com/DocesDaCasa.Oficial/">
            <img src="img/instagram.svg" alt="instagram" width="20" />
            Instagram
          </a>
        </li>
        <li class="lista-item">
          <a class="link" href="https://twitter.com/talisduarte007">
            <img src="img/twitter.svg" alt="twitter" width="20" />
            Twitter
          </a>
        </li>
        <li class="lista-item">
          <a class="link" href="https://github.com/TalisDuarte007">
            <img src="img/github.svg" alt="github" width="20" />
            GitHub
          </a>
        </li>
        <li class="lista-item">
          <a class="link" href="https://my-curriculum-react.vercel.app/">
            <img src="img/currículo.png" alt="twitch" width="20" />
            Currículo
          </a>
        </li>
      </ul>
    </main>
    <script src="./js/index.js"></script>
    <script src="https://github.com/TalisDuarte007/DocesDaCasa_Link_In_Bio/blob/main/js/index.js"></script>
  </body>
</html>
